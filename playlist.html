<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist 3 Lagu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 20px;
    }

    .player {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .cover {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 20px;
      border: 4px solid white;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    #artist {
      color: #cbd5e1;
      margin-bottom: 18px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    button {
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .play-btn {
      background: #22c55e;
      color: white;
    }

    .play-btn:hover {
      background: #16a34a;
    }

    .next-btn {
      background: #3b82f6;
      color: white;
    }

    .next-btn:hover {
      background: #2563eb;
    }

    .prev-btn {
      background: #f59e0b;
      color: white;
    }

    .prev-btn:hover {
      background: #d97706;
    }

    .speaker-btn {
      background: #8b5cf6;
      color: white;
    }

    .speaker-btn:hover {
      background: #7c3aed;
    }

    .playlist {
      margin-top: 20px;
      text-align: left;
    }

    .song {
      background: rgba(255, 255, 255, 0.08);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .song:hover,
    .song.active {
      background: rgba(255, 255, 255, 0.2);
    }

    audio {
      width: 100%;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="player">
    <img src="about you.png" alt="Cover Lagu" class="cover" id="cover">
    <h1 id="title">About You</h1>
    <p id="artist">The 1975</p>

    <audio id="audio" controls>
      <source id="source" src="The 1975 - About You (Official).mp3" type="audio/mpeg">
      Browser kamu tidak mendukung audio.
    </audio>

    <div class="controls">
      <button class="prev-btn" onclick="prevSong()">⏮ Prev</button>
      <button class="play-btn" onclick="togglePlay()" id="playBtn">▶ Play</button>
      <button class="next-btn" onclick="nextSong()">Next ⏭</button>
      <button class="speaker-btn" onclick="toggleMute()" id="muteBtn">🔊</button>
    </div>

    <div class="playlist">
      <div class="song active" onclick="playSong(0)">1. About You</div>
      <div class="song" onclick="playSong(1)">2. Take me home country roads</div>
      <div class="song" onclick="playSong(2)">3. Forever Young</div>
    </div>
  </div>

  <script>
    const songs = [
      {
        title: "About You",
        artist: "The 1975",
        src: "The 1975 - About You (Official).mp3",
        cover: "about you.png"
      },
      {
        title: "Take me home country roads",
        artist: "John Denver",
        src: "11.Take me home country roads - John Denver.mp3",
        cover: "Take Me Home, Country Roads.jpg"
      },
      {
        title: "Forever Young",
        artist: "Alphaville",
        src: "Alphaville - Forever Young _Official Video(MP3_160K).mp3",
        cover: "forever young.jpg"
      }
    ];

    let currentSong = 0;
    const audio = document.getElementById("audio");
    const source = document.getElementById("source");
    const title = document.getElementById("title");
    const artist = document.getElementById("artist");
    const cover = document.getElementById("cover");
    const playBtn = document.getElementById("playBtn");
    const muteBtn = document.getElementById("muteBtn");
    const playlistItems = document.querySelectorAll(".song");

    function loadSong(index) {
      currentSong = index;
      const song = songs[index];
      title.textContent = song.title;
      artist.textContent = song.artist;
      cover.src = song.cover;
      source.src = song.src;
      audio.load();

      playlistItems.forEach(item => item.classList.remove("active"));
      playlistItems[index].classList.add("active");
    }

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸ Pause";
      } else {
        audio.pause();
        playBtn.textContent = "▶ Play";
      }
    }

    function nextSong() {
      currentSong = (currentSong + 1) % songs.length;
      loadSong(currentSong);
      audio.play();
      playBtn.textContent = "⏸ Pause";
    }

    function prevSong() {
      currentSong = (currentSong - 1 + songs.length) % songs.length;
      loadSong(currentSong);
      audio.play();
      playBtn.textContent = "⏸ Pause";
    }

    function playSong(index) {
      loadSong(index);
      audio.play();
      playBtn.textContent = "⏸ Pause";
    }

    function toggleMute() {
      audio.muted = !audio.muted;
      muteBtn.textContent = audio.muted ? "🔇" : "🔊";
    }

    audio.addEventListener("ended", nextSong);

    loadSong(0);
  </script>
</body>
</html>
